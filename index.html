<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нотатки</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        <style>
    :root { 
        --bg: #121212; 
        --panel: #1e1e1e; 
        --text: #e0e0e0; 
        --accent: #2ecc71; 
        --danger: #e74c3c;
        --input-bg: #252525;
    }

    body { 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        display: flex; 
        height: 100vh; 
    }

    /* Бічна панель */
    .sidebar { 
        width: 300px; 
        background: var(--panel); 
        display: flex; 
        flex-direction: column; 
        border-right: 1px solid #333;
        transition: 0.3s;
    }

    @media (max-width: 600px) {
        .sidebar { width: 80px; } /* На телефонах робимо вужчою */
        .sidebar span, .sidebar button { font-size: 0; padding: 10px; }
        .sidebar i { font-size: 1.5rem !important; margin: 0 !important; }
    }

    .sidebar-header { 
        padding: 20px; 
        font-size: 1.2rem;
        font-weight: bold; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
    }

    /* Список нотаток */
    .note-item { 
        padding: 15px; 
        margin: 5px 10px; 
        border-radius: 10px; 
        background: var(--input-bg); 
        cursor: pointer; 
        transition: 0.2s;
        border: 1px solid transparent;
    }
    .note-item:hover { background: #333; border-color: var(--accent); }

    /* Редактор */
    .editor { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        padding: 20px;
        gap: 15px;
    }

    #note-title { 
        background: transparent; 
        border: none; 
        color: white; 
        font-size: 2rem; 
        font-weight: bold;
        outline: none;
    }

    #note-content { 
        flex: 1; 
        background: var(--input-bg); 
        border: 1px solid #333; 
        border-radius: 15px;
        color: white; 
        padding: 20px; 
        font-size: 1.1rem; 
        outline: none; 
        resize: none; 
    }

    /* Контейнер для кнопок */
    .controls { 
        display: flex; 
        gap: 15px; 
        margin-top: 10px;
    }

    .btn {
        flex: 1; /* Це зробить кнопки однаковими за шириною */
        padding: 15px;
        border-radius: 12px;
        border: none;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.3s;
    }

    .btn-save { background: var(--accent); color: white; }
    .btn-save:hover { background: #27ae60; transform: translateY(-2px); }

    .btn-delete { background: var(--danger); color: white; }
    .btn-delete:hover { background: #c0392b; transform: translateY(-2px); }

    .btn-new { background: #3498db; color: white; margin: 10px; }
</style>
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Вхід</h2>
            <input type="text" id="username" placeholder="Логін">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn-primary" onclick="handleAuth()" id="auth-btn">Увійти</button>
            <button class="btn-link" onclick="toggleAuthMode()" id="auth-toggle">Немає акаунту? Реєстрація</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Нотатки</span>
                <i class="fas fa-sign-out-alt logout-btn" onclick="logout()"></i>
            </div>
            <button class="btn-primary" style="margin: 10px;" onclick="newNote()">+ Нова нотатка</button>
            <div id="notes-list" class="notes-list"></div>
        </div>
        <div class="editor">
            <input type="text" id="note-title" placeholder="Заголовок..." style="background:transparent; border:none; font-size:1.5em; padding:20px 30px 0;">
            <textarea id="note-content" placeholder="Пиши тут..."></textarea>
            <div class="controls">
    <button class="btn btn-save" onclick="saveNote()">
        <i class="fas fa-save"></i> Зберегти
    </button>
    <button class="btn btn-delete" onclick="deleteNote()">
        <i class="fas fa-trash"></i> Видалити
    </button>
</div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let isRegisterMode = false;
        let currentNoteId = null;

        // Перевірка токена при запуску
        window.onload = () => {
            if (localStorage.getItem('token')) {
                showMain();
            }
        };

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "Реєстрація" : "Вхід";
            document.getElementById('auth-btn').innerText = isRegisterMode ? "Створити акаунт" : "Увійти";
            document.getElementById('auth-toggle').innerText = isRegisterMode ? "Вже є акаунт? Увійти" : "Немає акаунту? Реєстрація";
        }

    async function handleAuth() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const path = isRegisterMode ? "/register" : "/token";

    const res = await fetch(API_URL + path, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }) 
    });
    const data = await res.json();

    if (res.ok) {
        if (isRegisterMode) {
            alert("Успішно! Тепер увійдіть.");
            toggleAuthMode();
        } else {
            localStorage.setItem('token', data.access_token);
            showMain();
        }
    } else {
        alert(data.detail || "Помилка");
    }
}
        function showMain() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            loadNotes();
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        async function loadNotes() {
            const res = await fetch(API_URL + "/notes", {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            const data = await res.json();
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            data.notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerText = n.title || 'Без назви';
                div.onclick = () => openNote(n);
                list.appendChild(div);
            });
        }

        function openNote(note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content;
        }

        function newNote() {
            currentNoteId = null;
            document.getElementById('note-title').value = '';
            document.getElementById('note-content').value = '';
        }

        async function saveNote() {
            const note = {
                title: document.getElementById('note-title').value,
                content: document.getElementById('note-content').value
            };
            const method = 'POST'; // Для простоти завжди POST, бекенд створить нову
            await fetch(API_URL + "/notes", {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify(note)
            });
            loadNotes();
            newNote();
        }

        async function deleteNote() {
            if (!currentNoteId) return;
            await fetch(API_URL + "/notes/" + currentNoteId, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            loadNotes();
            newNote();
        }
    </script>
</body>
</html>
