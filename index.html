<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нотатки</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root { 
        --bg: #121212; 
        --panel: #1e1e1e; 
        --text: #e0e0e0; 
        --accent: #2ecc71; 
        --danger: #e74c3c; 
        --info: #3498db;
        --input-bg: #252525;
    }

    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

    /* Головний контейнер (додай цей клас у батьківський div) */
    .app-container {
        display: flex;
        height: 100vh;
        width: 100%;
    }

    /* Екран авторизації */
    #auth-screen { 
        position: fixed; inset: 0; background: var(--bg); 
        display: flex; align-items: center; justify-content: center; z-index: 9999; 
    }
    .auth-card { 
        background: var(--panel); padding: 40px; border-radius: 20px; 
        width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .auth-card input { 
        width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; 
        border: 1px solid #333; background: var(--input-bg); color: white; box-sizing: border-box; 
    }

    /* Сайдбар */
    .sidebar { 
        width: 300px; background: var(--panel); display: flex; 
        flex-direction: column; border-right: 1px solid #333; transition: 0.3s;
    }
    .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; }
    
    .notes-list { flex: 1; overflow-y: auto; padding: 10px; }
    .note-item { 
        padding: 15px; margin-bottom: 8px; border-radius: 10px; 
        background: var(--input-bg); cursor: pointer; transition: 0.2s;
        border-left: 4px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .note-item:hover { background: #333; border-left-color: var(--accent); }

    /* Редактор */
    .editor { flex: 1; display: flex; flex-direction: column; padding: 30px; gap: 15px; overflow: hidden; }
    #note-title { 
        background: transparent; border: none; color: white; 
        font-size: 2rem; font-weight: bold; outline: none; width: 100%;
    }
    #note-content { 
        flex: 1; background: var(--input-bg); border: 1px solid #333; 
        border-radius: 15px; color: #ccc; padding: 20px; font-size: 1.1rem; 
        outline: none; resize: none; line-height: 1.6; min-height: 0;
    }

    /* Група кнопок */
    .button-group { 
        display: flex; gap: 10px; width: 100%; margin-top: 5px;
    }

    .btn {
        flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold;
        cursor: pointer; display: flex; align-items: center; justify-content: center; 
        gap: 8px; transition: 0.2s; color: white; font-size: 14px;
    }
    .btn-save { background: var(--accent); }
    .btn-save:hover { background: #27ae60; }
    
    .btn-delete { background: var(--danger); }
    .btn-delete:hover { background: #c0392b; }
    
    .btn-photo { background: #9b59b6; } /* Фіолетовий для фото */
    .btn-photo:hover { background: #8e44ad; }

    .btn-new { background: var(--info); margin: 10px 15px; }

    .logout-btn { color: var(--danger); cursor: pointer; font-size: 1.2rem; }

    /* Адаптивність для мобільних пристроїв */
    @media (max-width: 768px) {
        .app-container { flex-direction: column; }

        .sidebar { 
            width: 100% !important; 
            height: 35%; 
            border-right: none; 
            border-bottom: 1px solid #333; 
        }

        .editor { 
            height: 65%; 
            padding: 15px; 
        }

        #note-title { font-size: 1.5rem; }
        
        .button-group { padding-bottom: 10px; }
        
        .btn { padding: 12px 5px; font-size: 12px; }
    }
</style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Вхід</h2>
            <input type="text" id="username" placeholder="Логін">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn btn-primary" onclick="handleAuth()" id="auth-btn">Увійти</button>
            <button class="btn btn-link" onclick="toggleAuthMode()" id="auth-toggle">Немає акаунту? Реєстрація</button>
        </div>
    </div>

 <div id="main-ui" class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <span>Нотатки</span>
            <i class="fas fa-sign-out-alt logout-btn" onclick="logout()"></i>
        </div>
        <button class="btn btn-new" onclick="newNote()">
            <i class="fas fa-plus"></i> <span>Нова нотатка</span>
        </button>
        <div id="notes-list" class="notes-list"></div>
    </div>

    <div class="editor">
        <input type="text" id="note-title" placeholder="Заголовок...">
        <textarea id="note-content" placeholder="Ваш текст тут..."></textarea>
        
        <div class="button-group">
            <button id="save-btn" class="btn btn-save" onclick="saveNote()">
                <i class="fas fa-save"></i> Зберегти
            </button>
            <button id="delete-btn" class="btn btn-delete" onclick="deleteNote()">
                <i class="fas fa-trash"></i> Видалити
            </button>
            <button id="photo-btn" class="btn btn-photo" onclick="takePhoto()">
                <i class="fas fa-camera"></i> Фото
            </button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
    </div>
</div>

    <script>
        const API_URL = window.location.origin;
        let isRegisterMode = false;
        let currentNoteId = null;

        window.onload = () => { if (localStorage.getItem('token')) showMain(); };

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "Реєстрація" : "Вхід";
            document.getElementById('auth-btn').innerText = isRegisterMode ? "Створити акаунт" : "Увійти";
            document.getElementById('auth-toggle').innerText = isRegisterMode ? "Вже є акаунт? Увійти" : "Немає акаунту? Реєстрація";
        }

        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const path = isRegisterMode ? "/register" : "/token";
            const res = await fetch(API_URL + path, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass }) 
            });
            const data = await res.json();
            if (res.ok) {
                if (isRegisterMode) { alert("Успішно! Увійдіть."); toggleAuthMode(); }
                else { localStorage.setItem('token', data.access_token); showMain(); }
            } else { alert(data.detail || "Помилка"); }
        }

        function showMain() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            loadNotes();
        }

        function logout() { localStorage.removeItem('token'); location.reload(); }

        async function loadNotes() {
            const res = await fetch(API_URL + "/notes", {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            const data = await res.json();
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            data.notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerText = n.title || 'Без назви';
                div.onclick = () => openNote(n);
                list.appendChild(div);
            });
        }

        function openNote(note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content;
        }

        function newNote() { currentNoteId = null; document.getElementById('note-title').value = ''; document.getElementById('note-content').value = ''; }

        async function saveNote() {
            const note = { title: document.getElementById('note-title').value, content: document.getElementById('note-content').value };
            await fetch(API_URL + "/notes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                body: JSON.stringify(note)
            });
            loadNotes();
            newNote();
        }

        async function deleteNote() {
            if (!currentNoteId) return;
            await fetch(API_URL + "/notes/" + currentNoteId, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            loadNotes();
            newNote();
        }

        const photoBtn = document.getElementById('photo-btn');
const imageInput = document.getElementById('imageInput');

// 1. При кліку на кнопку "Фото" відкриваємо вікно вибору файлу (або камеру на телефоні)
photoBtn.onclick = function() {
    imageInput.click();
};

// 2. Коли фото вибрано
imageInput.onchange = function(event) {
    const file = event.target.files[0];
    if (file) {
        // Тут ми можемо або одразу завантажити на сервер, 
        // або вставити посилання в текст нотатки
        console.log("Фото вибрано:", file.name);
        uploadImage(file); // Функція, яку ми напишемо далі
    }
};

async function uploadImage(file) {
    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("/upload-image", {
            method: "POST",
            body: formData
        });
        
        if (response.ok) {
            const data = await response.json();
            // Вставляємо шлях до картинки в Markdown форматі в текст нотатки
            const content = document.getElementById('note-content');
            content.value += `\n![image](${data.url})\n`;
            alert("Фото завантажено!");
        }
    } catch (error) {
        console.error("Помилка завантаження:", error);
        alert("Не вдалося завантажити фото");
    }
}

    </script>
</body>
</html>
