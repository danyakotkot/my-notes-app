<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нотатки</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Авторизація */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; margin-top: 10px; }
        .btn-link { background: none; color: #888; font-size: 0.9em; margin-top: 15px; }

        /* Основний інтерфейс */
        #main-ui { display: none; width: 100%; height: 100%; }
        .sidebar { width: 260px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .notes-list { flex: 1; overflow-y: auto; padding: 10px; }
        .note-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; background: #252525; cursor: pointer; transition: 0.2s; }
        .note-item:hover { background: #333; }
        .editor { flex: 1; display: flex; flex-direction: column; background: #121212; }
        textarea { flex: 1; background: transparent; color: white; border: none; padding: 30px; font-size: 1.1em; outline: none; resize: none; }
        .controls { padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .logout-btn { color: #e74c3c; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Вхід</h2>
            <input type="text" id="username" placeholder="Логін">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn-primary" onclick="handleAuth()" id="auth-btn">Увійти</button>
            <button class="btn-link" onclick="toggleAuthMode()" id="auth-toggle">Немає акаунту? Реєстрація</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Нотатки</span>
                <i class="fas fa-sign-out-alt logout-btn" onclick="logout()"></i>
            </div>
            <button class="btn-primary" style="margin: 10px;" onclick="newNote()">+ Нова нотатка</button>
            <div id="notes-list" class="notes-list"></div>
        </div>
        <div class="editor">
            <input type="text" id="note-title" placeholder="Заголовок..." style="background:transparent; border:none; font-size:1.5em; padding:20px 30px 0;">
            <textarea id="note-content" placeholder="Пиши тут..."></textarea>
            <div class="controls">
                <button class="btn-primary" onclick="saveNote()">Зберегти</button>
                <button style="background:#e74c3c; color:white;" onclick="deleteNote()">Видалити</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let isRegisterMode = false;
        let currentNoteId = null;

        // Перевірка токена при запуску
        window.onload = () => {
            if (localStorage.getItem('token')) {
                showMain();
            }
        };

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "Реєстрація" : "Вхід";
            document.getElementById('auth-btn').innerText = isRegisterMode ? "Створити акаунт" : "Увійти";
            document.getElementById('auth-toggle').innerText = isRegisterMode ? "Вже є акаунт? Увійти" : "Немає акаунту? Реєстрація";
        }

    async function handleAuth() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const path = isRegisterMode ? "/register" : "/token";

    const res = await fetch(API_URL + path, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }) 
    });
    const data = await res.json();

    if (res.ok) {
        if (isRegisterMode) {
            alert("Успішно! Тепер увійдіть.");
            toggleAuthMode();
        } else {
            localStorage.setItem('token', data.access_token);
            showMain();
        }
    } else {
        alert(data.detail || "Помилка");
    }
}
        function showMain() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            loadNotes();
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        async function loadNotes() {
            const res = await fetch(API_URL + "/notes", {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            const data = await res.json();
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            data.notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerText = n.title || 'Без назви';
                div.onclick = () => openNote(n);
                list.appendChild(div);
            });
        }

        function openNote(note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content;
        }

        function newNote() {
            currentNoteId = null;
            document.getElementById('note-title').value = '';
            document.getElementById('note-content').value = '';
        }

        async function saveNote() {
            const note = {
                title: document.getElementById('note-title').value,
                content: document.getElementById('note-content').value
            };
            const method = 'POST'; // Для простоти завжди POST, бекенд створить нову
            await fetch(API_URL + "/notes", {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify(note)
            });
            loadNotes();
            newNote();
        }

        async function deleteNote() {
            if (!currentNoteId) return;
            await fetch(API_URL + "/notes/" + currentNoteId, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            loadNotes();
            newNote();
        }
    </script>
</body>
</html>
